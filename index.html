<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoalQuest — 인생 레벨업</title>
<style>
:root {
  --bg:#080816;--panel:#10102a;--panel2:#181836;--border:#252550;
  --text:#e2e8f0;--text-dim:#7080a0;--gold:#f5c842;--gold2:#ffaa00;
  --pixel:"Courier New","Lucida Console",monospace;
  --body:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕','Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;
  background-image:radial-gradient(ellipse at 15% 40%,rgba(239,68,68,.04) 0%,transparent 55%),
  radial-gradient(ellipse at 85% 20%,rgba(96,165,250,.04) 0%,transparent 55%),
  radial-gradient(ellipse at 50% 90%,rgba(245,200,66,.04) 0%,transparent 55%);}
.wrap{max-width:860px;margin:0 auto;padding:16px 12px 80px;}
.header{text-align:center;padding:20px 0 16px;}
.header h1{font-family:var(--pixel);font-size:16px;color:var(--gold);text-shadow:0 0 24px rgba(245,200,66,.7);letter-spacing:2px;margin-bottom:4px;}
.header .sub{font-size:11px;color:var(--text-dim);letter-spacing:3px;}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,22,.95);border-top:1px solid var(--border);display:flex;z-index:50;}
.nav-btn{flex:1;padding:12px 4px 10px;background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-family:var(--body);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;}
.nav-btn .nav-icon{font-size:18px;}
.nav-btn.active{color:var(--gold);}

/* ── PAGE ── */
.page{display:none;}.page.active{display:block;}

/* ── DASHBOARD ── */
.dashboard-grid{display:grid;grid-template-columns:1fr 140px 1fr;gap:10px;align-items:center;margin-bottom:16px;}
.cat-col{display:flex;flex-direction:column;gap:8px;}
.cat-mini-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 12px;transition:border-color .2s;}
.cat-mini-card:hover{border-color:rgba(255,255,255,.1);}
.cat-mini-top{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.cat-mini-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cat-mini-name{font-weight:800;font-size:12px;flex:1;}
.cat-mini-lv{font-family:var(--pixel);font-size:7px;color:var(--gold);}
.cat-mini-bar-wrap{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.cat-mini-bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.34,1.3,.64,1);}

/* ── LIFE CENTER ── */
.life-center{display:flex;flex-direction:column;align-items:center;gap:6px;background:linear-gradient(135deg,#14142e,#1e1e42);border:1px solid rgba(245,200,66,.3);border-radius:14px;padding:14px 10px;position:relative;overflow:hidden;}
.life-center::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.knight-wrap{width:90px;height:90px;}
.knight-wrap svg{width:100%;height:100%;}
.life-lv-txt{font-family:var(--pixel);font-size:10px;color:var(--gold);text-shadow:0 0 10px rgba(245,200,66,.6);}
.life-title-txt{font-size:9px;color:var(--gold2);font-weight:700;text-align:center;}
.life-exp-txt{font-family:var(--pixel);font-size:6px;color:var(--text-dim);}
.life-bar-w{width:100%;height:10px;background:rgba(255,255,255,.05);border-radius:5px;border:1px solid rgba(245,200,66,.2);overflow:hidden;}
.life-bar-f{height:100%;background:linear-gradient(90deg,#c97c00,var(--gold),#ffe080);border-radius:5px;transition:width .8s cubic-bezier(.34,1.3,.64,1);}

/* ── SECTION HD ── */
.section-hd{font-family:var(--pixel);font-size:7px;color:var(--text-dim);margin:16px 0 8px;letter-spacing:1px;display:flex;align-items:center;gap:10px;}
.section-hd::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── QUEST SECTIONS ── */
.cat-section{background:var(--panel);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.cat-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .15s;}
.cat-header:hover{background:rgba(255,255,255,.02);}
.cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.cat-h-name{font-weight:800;font-size:13px;flex:1;}
.cat-h-lv{font-family:var(--pixel);font-size:7px;padding:2px 6px;border-radius:3px;border:1px solid;}
.cat-toggle{color:var(--text-dim);font-size:11px;flex-shrink:0;transition:transform .2s;}
.cat-toggle.open{transform:rotate(180deg);}
.cat-body{padding:0 10px 10px;}

/* ── QUEST CARD ── */
.quest-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:7px;transition:border-color .2s,box-shadow .2s;}
.quest-card:hover{border-color:rgba(255,255,255,.1);}
.quest-card.done-today{box-shadow:0 0 10px rgba(255,255,255,.15);border-color:rgba(255,255,255,.35);}
.quest-card.done-today .quest-name{color:#fff;}
.quest-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.quest-name-wrap{flex:1;min-width:0;}
.quest-name{font-weight:800;font-size:13px;display:block;margin-bottom:2px;}
.quest-lv-big{font-family:var(--pixel);font-size:11px;}
.quest-row{display:flex;align-items:center;gap:8px;}
.quest-bar-wrap{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:4px;border:1px solid var(--border);overflow:hidden;}
.quest-bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.34,1.3,.64,1);position:relative;}
.quest-bar-fill::after{content:'';position:absolute;top:1px;left:3px;right:3px;height:2px;background:rgba(255,255,255,.3);border-radius:2px;}
.exp-up-btn{font-family:var(--pixel);font-size:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:var(--text);padding:6px 7px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:background .15s,transform .1s;}
.exp-up-btn:hover{background:rgba(255,255,255,.12);transform:scale(1.05);}
.log-area{margin-top:6px;display:flex;flex-direction:column;gap:3px;}
.log-entry{font-size:11px;color:var(--text-dim);background:rgba(255,255,255,.02);border-left:2px solid;padding:3px 7px;border-radius:0 4px 4px 0;display:flex;gap:8px;align-items:center;}
.log-exp{font-family:var(--pixel);font-size:6px;white-space:nowrap;}
.add-quest-row{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;}
.add-quest-row input{flex:1;min-width:100px;background:rgba(255,255,255,.04);border:1px dashed var(--border);border-radius:7px;color:var(--text);font-family:var(--body);font-size:12px;padding:6px 9px;outline:none;}
.add-quest-row input:focus{border-color:rgba(255,255,255,.2);}
.btn-add-quest{font-family:var(--pixel);font-size:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:var(--text);padding:6px 9px;border-radius:7px;cursor:pointer;}
.btn-del{background:transparent;border:none;color:rgba(255,255,255,.2);cursor:pointer;font-size:12px;padding:2px 3px;line-height:1;transition:color .15s;flex-shrink:0;}
.btn-del:hover{color:#ef4444;}
.btn-preset-edit{background:transparent;border:none;color:rgba(255,255,255,.2);cursor:pointer;font-size:12px;padding:2px 3px;line-height:1;transition:color .15s;flex-shrink:0;}
.btn-preset-edit:hover{color:var(--gold);}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);z-index:100;justify-content:center;align-items:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--panel2);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:22px 20px;width:100%;max-width:400px;animation:pop .2s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto;}
@keyframes pop{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-title{font-family:var(--pixel);font-size:8px;color:var(--gold);margin-bottom:4px;text-align:center;}
.modal-sub{font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:14px;font-weight:700;}
.field-wrap{margin-bottom:12px;}
.field-label{font-family:var(--pixel);font-size:6px;color:var(--text-dim);margin-bottom:4px;display:block;}
.modal input,.modal textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--body);font-size:14px;padding:8px 11px;outline:none;transition:border-color .2s;}
.modal input:focus,.modal textarea:focus{border-color:rgba(255,255,255,.3);}
.modal input[type=number]{font-family:var(--pixel);font-size:18px;text-align:center;}
.modal textarea{resize:none;height:60px;}
.modal-btns{display:flex;gap:8px;margin-top:14px;}
.btn-confirm{flex:1;font-family:var(--pixel);font-size:7px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;box-shadow:0 4px 14px rgba(124,58,237,.4);transition:transform .1s;}
.btn-confirm:hover{transform:translateY(-2px);}
.btn-cancel{font-family:var(--pixel);font-size:7px;background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:12px 14px;border-radius:8px;cursor:pointer;}

/* preset buttons */
.preset-btns{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.preset-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:var(--text);padding:9px 12px;cursor:pointer;text-align:left;font-family:var(--body);font-size:13px;transition:background .15s,border-color .15s;display:flex;justify-content:space-between;align-items:center;}
.preset-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);}
.preset-exp{font-family:var(--pixel);font-size:7px;color:var(--gold);}
.preset-divider{text-align:center;font-size:11px;color:var(--text-dim);margin-bottom:10px;position:relative;}
.preset-divider::before,.preset-divider::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:var(--border);}
.preset-divider::before{left:0;}.preset-divider::after{right:0;}

/* preset edit modal */
.preset-item-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;}
.preset-item-row input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--body);font-size:13px;padding:7px 10px;outline:none;}
.preset-item-row input[type=number]{width:60px;flex:none;font-family:var(--pixel);font-size:12px;text-align:center;}
.preset-item-row input:focus{border-color:rgba(255,255,255,.3);}
.preset-remove{background:transparent;border:none;color:rgba(255,255,255,.25);cursor:pointer;font-size:14px;padding:2px 4px;}
.preset-remove:hover{color:#ef4444;}

/* levelup */
.levelup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;justify-content:center;align-items:center;}
.levelup-overlay.open{display:flex;}
.levelup-box{text-align:center;animation:levelup .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes levelup{from{transform:scale(.4) rotate(-8deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.levelup-icon{font-size:48px;margin-bottom:10px;}
.levelup-title{font-family:var(--pixel);font-size:18px;color:var(--gold);text-shadow:0 0 30px rgba(245,200,66,.9);line-height:1.5;margin-bottom:6px;}
.levelup-sub{font-family:var(--pixel);font-size:8px;color:#60a5fa;margin-bottom:20px;line-height:1.8;}
.levelup-close{font-family:var(--pixel);font-size:7px;border:1px solid var(--gold);color:var(--gold);background:transparent;padding:10px 16px;border-radius:6px;cursor:pointer;}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav-btn{background:transparent;border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:14px;}
.cal-month{font-family:var(--pixel);font-size:10px;color:var(--gold);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-size:10px;color:var(--text-dim);padding:4px 0;font-weight:700;}
.cal-day{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:4px;min-height:52px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;flex-direction:column;align-items:center;}
.cal-day:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.03);}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-day.today{border-color:var(--gold);background:rgba(245,200,66,.05);}
.cal-day-num{font-size:11px;font-weight:700;margin-bottom:3px;}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;}
.cal-dot{width:7px;height:7px;border-radius:50%;}
.cal-detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:150;justify-content:center;align-items:center;padding:16px;}
.cal-detail-overlay.open{display:flex;}
.cal-detail{background:var(--panel2);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:22px 20px;width:100%;max-width:380px;animation:pop .2s cubic-bezier(.34,1.56,.64,1);}
.cal-detail-title{font-family:var(--pixel);font-size:9px;color:var(--gold);margin-bottom:14px;text-align:center;}
.cal-detail-item{display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.cal-detail-item:last-child{border-bottom:none;}
.cal-detail-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.cal-detail-exp{font-family:var(--pixel);font-size:7px;margin-left:auto;white-space:nowrap;}
.cal-close{font-family:var(--pixel);font-size:7px;border:1px solid var(--border);color:var(--text-dim);background:transparent;padding:10px;border-radius:6px;cursor:pointer;width:100%;margin-top:14px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><h1>⚔ GOAL QUEST ⚔</h1><div class="sub">나의 인생을 레벨업하라</div></div>

  <!-- PAGE: DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <div class="dashboard-grid">
      <div class="cat-col" id="catLeft"></div>
      <div class="life-center">
        <div class="knight-wrap" id="knightWrap"></div>
        <div class="life-lv-txt" id="lifeLvText">LV.1</div>
        <div class="life-title-txt" id="lifeTitleText">견습 모험가</div>
        <div class="life-exp-txt" id="lifeExpText">EXP 0/2</div>
        <div class="life-bar-w"><div class="life-bar-f" id="lifeBar" style="width:0%"></div></div>
      </div>
      <div class="cat-col" id="catRight"></div>
    </div>
    <div class="section-hd">ACTIVE QUESTS</div>
    <div id="questSections"></div>
  </div>

  <!-- PAGE: JOURNAL -->
  <div class="page" id="page-journal">
    <div class="section-hd">실행일지</div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calMove(-1)">◀</button>
      <span class="cal-month" id="calMonthLabel"></span>
      <button class="cal-nav-btn" onclick="calMove(1)">▶</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-dashboard" onclick="showPage('dashboard')">
    <span class="nav-icon">⚔️</span><span>퀘스트</span>
  </button>
  <button class="nav-btn" id="nav-journal" onclick="showPage('journal')">
    <span class="nav-icon">📅</span><span>실행일지</span>
  </button>
</div>

<!-- EXP Modal -->
<div class="modal-overlay" id="expModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">⚡ EXP UP</div>
    <div class="modal-sub" id="modalQuestName"></div>
    <div id="modalModeNote" style="display:none;font-size:11px;color:#facc15;background:rgba(250,204,21,.08);border:1px solid rgba(250,204,21,.2);border-radius:6px;padding:6px 10px;margin-bottom:12px;text-align:center;"></div>
    <!-- Preset buttons -->
    <div id="presetArea"></div>
    <div class="field-wrap">
      <label class="field-label" id="expLabel">추가할 경험치</label>
      <input type="number" id="expInput" min="1" placeholder="1"/>
    </div>
    <div class="field-wrap">
      <label class="field-label">실행 내용 메모</label>
      <textarea id="memoInput" placeholder="오늘 무엇을 했나요?"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-confirm" onclick="confirmExp()">입력 완료</button>
    </div>
  </div>
</div>

<!-- Preset Edit Modal -->
<div class="modal-overlay" id="presetModal">
  <div class="modal">
    <div class="modal-title">⚙️ 빠른입력 설정</div>
    <div class="modal-sub" id="presetModalSub"></div>
    <div id="presetEditArea"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closePresetModal()">취소</button>
      <button class="btn-confirm" onclick="savePresets()">저장</button>
    </div>
  </div>
</div>

<!-- Level Up Modal -->
<div class="levelup-overlay" id="lvModal">
  <div class="levelup-box">
    <div class="levelup-icon" id="lvIcon">⭐</div>
    <div class="levelup-title" id="lvTitle">LEVEL UP!</div>
    <div class="levelup-sub" id="lvSub"></div>
    <button class="levelup-close" onclick="closeLvModal()">CONTINUE ▶</button>
  </div>
</div>

<!-- Calendar Detail -->
<div class="cal-detail-overlay" id="calDetailOverlay">
  <div class="cal-detail">
    <div class="cal-detail-title" id="calDetailTitle"></div>
    <div id="calDetailBody"></div>
    <button class="cal-close" onclick="closeCalDetail()">닫기</button>
  </div>
</div>

<script>
const SAVE_KEY='goalquest_v4';

const CAT_META={
  health: {label:'건강',color:'#ef4444',bg:'rgba(239,68,68,.12)',icon:'❤️'},
  mental: {label:'맨탈',color:'#a78bfa',bg:'rgba(167,139,250,.12)',icon:'🧠'},
  family: {label:'가족',color:'#4ade80',bg:'rgba(74,222,128,.12)',icon:'🏠'},
  finance:{label:'재정',color:'#facc15',bg:'rgba(250,204,21,.12)',icon:'💰'},
  study:  {label:'학습',color:'#60a5fa',bg:'rgba(96,165,250,.12)',icon:'📚'},
  work:   {label:'업무',color:'#94a3b8',bg:'rgba(148,163,184,.12)',icon:'💼'},
};
const CAT_KEYS=Object.keys(CAT_META);
const LEFT_CATS=['health','mental','family'];
const RIGHT_CATS=['finance','study','work'];

const DEFAULT_QUESTS=[
  {id:1,cat:'health',name:'걷기 & 달리기',lv:1,exp:0,logs:[],presets:[]},
  {id:2,cat:'health',name:'근력운동',lv:1,exp:0,logs:[],presets:[]},
  {id:3,cat:'health',name:'스트레칭 & 기타',lv:1,exp:0,logs:[],presets:[]},
  {id:4,cat:'health',name:'물마시기 & 기타',lv:1,exp:0,logs:[],presets:[]},
  {id:5,cat:'mental',name:'명상 & 마음챙김',lv:1,exp:0,logs:[],presets:[]},
  {id:6,cat:'mental',name:'기타',lv:1,exp:0,logs:[],presets:[]},
  {id:7,cat:'family',name:'가족과 적극적으로 시간보내기',lv:1,exp:0,logs:[],presets:[]},
  {id:8,cat:'family',name:'식사관련 & 기타',lv:1,exp:0,logs:[],presets:[]},
  {id:9,cat:'finance',name:'SOXL투자',lv:1,exp:0,logs:[],presets:[]},
  {id:10,cat:'finance',name:'재정상황 정리 & 기타',lv:1,exp:0,logs:[],presets:[]},
  {id:11,cat:'study',name:'독서',lv:1,exp:0,logs:[],presets:[]},
  {id:12,cat:'study',name:'코딩 & 기타',lv:1,exp:0,logs:[],presets:[]},
  {id:13,cat:'work',name:'일일 업무 목표 달성',lv:1,exp:0,logs:[],presets:[]},
  {id:14,cat:'work',name:'기타',lv:1,exp:0,logs:[],presets:[]},
];
const DEFAULT_CATS={health:{lv:1,exp:0},mental:{lv:1,exp:0},family:{lv:1,exp:0},finance:{lv:1,exp:0},study:{lv:1,exp:0},work:{lv:1,exp:0}};

// ── EXP CURVE ──
const EXP_TABLE=[0,2,5,10,18,30,45,65,90,120,160,200,250,310,380,460,550,650,760,880,1000,
  1150,1310,1480,1660,1850,2050,2260,2480,2710,2950,3200,3460,3730,4010,4300,4600,4910,5230,5560,5900,
  6260,6630,7010,7400,7800,8210,8630,9060,9500,9950,10420,10900,11390,11890,12400,12920,13450,13990,14540,15100,
  15680,16270,16870,17480,18100,18730,19370,20020,20680,21350,22030,22720,23420,24130,24850,25580,26320,27070,27830,28600,
  29380,30170,30970,31780,32600,33430,34270,35120,35980,36850,37730,38620,39520,40430,41350,42280,43220,44170,45130,99999];
function expForLv(lv){return lv>=100?99999:(EXP_TABLE[lv]||lv*10);}

function lifeTitleForLv(lv){
  if(lv<5)return'견습 모험가';if(lv<10)return'초보 전사';if(lv<20)return'숙련 전사';
  if(lv<30)return'정예 기사';if(lv<40)return'기사단장';if(lv<50)return'용사';
  if(lv<60)return'영웅';if(lv<70)return'전설의 용사';if(lv<80)return'불멸의 전사';
  if(lv<90)return'신화의 기사';return'황금 기사단장';
}

// ── KNIGHT SVG (per-level micro changes + tier changes) ──
function knightSVG(lv){
  const tier=lv>=90?10:lv>=80?9:lv>=70?8:lv>=60?7:lv>=50?6:lv>=40?5:lv>=30?4:lv>=20?3:lv>=10?2:lv>=5?1:0;
  // Micro variation within tier (0~4 per tier)
  const micro=Math.min(4,(lv-(tier===0?1:tier===1?5:tier===2?10:tier===3?20:tier===4?30:tier===5?40:tier===6?50:tier===7?60:tier===8?70:tier===9?80:90)));

  const TIER=[
    {body:'#8B6914',armor:'#a07820',helm:'#8B6914',shield:'#7a5c10',blade:'#c8a84a',sword:'#a07820',out:'#5a3c08'},
    {body:'#6b4c2a',armor:'#7d5a32',helm:'#6b4c2a',shield:'#5a3d1e',blade:'#c0a060',sword:'#8a6a3a',out:'#3d2408'},
    {body:'#6a7080',armor:'#7a8090',helm:'#6a7080',shield:'#5a6070',blade:'#b0c0d0',sword:'#8090a0',out:'#3a4050'},
    {body:'#7a8898',armor:'#909faf',helm:'#7a8898',shield:'#6a7888',blade:'#d0e0f0',sword:'#a0b0c0',out:'#404858'},
    {body:'#3a5888',armor:'#4a70a8',helm:'#3a5888',shield:'#2a4878',blade:'#a0c8f8',sword:'#5a80c8',out:'#1a3060'},
    {body:'#2a2a3a',armor:'#383848',helm:'#2a2a3a',shield:'#1a1a28',blade:'#8080f0',sword:'#5050a0',out:'#101018'},
    {body:'#a0a8b8',armor:'#c0c8d8',helm:'#a0a8b8',shield:'#909aa8',blade:'#e8f0ff',sword:'#c8d0e0',out:'#606870'},
    {body:'#909aa8',armor:'#c0a030',helm:'#909aa8',shield:'#707880',blade:'#f0d060',sword:'#d0b040',out:'#505860'},
    {body:'#882030',armor:'#b02838',helm:'#882030',shield:'#681820',blade:'#ff8090',sword:'#d03040',out:'#401018'},
    {body:'#c0a030',armor:'#e0c040',helm:'#c0a030',shield:'#a08020',blade:'#fff080',sword:'#e8d050',out:'#806010'},
    {body:'#d4aa20',armor:'#f5c842',helm:'#d4aa20',shield:'#c09018',blade:'#ffffc0',sword:'#f8d848',out:'#8a6000'},
  ];
  const c=TIER[tier];

  // Micro detail colors that change each level within tier
  const microColors=['#888','#aaa','#ccc','#eee','#fff'];
  const mc=microColors[micro]||microColors[0];
  const glow=tier>=3?`<filter id="gf"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`:'';
  const uf=tier>=3?'filter="url(#gf)"':'';
  const stars=tier>=7?`<circle cx="18" cy="15" r="1.5" fill="${c.blade}" opacity=".8"><animate attributeName="opacity" values=".8;.1;.8" dur="1.2s" repeatCount="indefinite"/></circle><circle cx="88" cy="20" r="1.2" fill="${c.blade}" opacity=".6"><animate attributeName="opacity" values=".6;0;.6" dur=".9s" repeatCount="indefinite"/></circle>`:'';
  const aura=tier>=8?`<ellipse cx="54" cy="70" rx="46" ry="55" fill="none" stroke="${c.blade}" stroke-width="1" opacity=".12"><animate attributeName="opacity" values=".12;.02;.12" dur="2s" repeatCount="indefinite"/></ellipse>`:'';

  // Micro changes: sword tip, shield emblem, helmet feather, armor gem, glow eyes
  const swordTip=micro>=1?`<polygon points="85,29 87,34 83,34" fill="${mc}" opacity=".9"/>`:'';
  const shieldEmblem=micro>=2?`<circle cx="19" cy="70" r="3" fill="${mc}" opacity=".5"/>`:'';
  const helmFeather=micro>=3&&tier<1?`<rect x="52" y="20" width="4" height="8" rx="2" fill="${mc}" opacity=".7"/>`:'';
  const armorGem=micro>=4?`<circle cx="54" cy="74" r="2.5" fill="${mc}" opacity=".6"/>`:'';

  return `<svg viewBox="0 0 110 130" xmlns="http://www.w3.org/2000/svg"><defs>${glow}</defs><g ${uf}>${stars}
  <rect x="8" y="55" width="22" height="30" rx="4" fill="${c.shield}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="11" y="58" width="16" height="22" rx="2" fill="${c.armor}" opacity=".5"/>
  <line x1="19" y1="56" x2="19" y2="84" stroke="${c.out}" stroke-width="1" opacity=".5"/>
  <line x1="9" y1="70" x2="29" y2="70" stroke="${c.out}" stroke-width="1" opacity=".5"/>
  ${shieldEmblem}${tier>=5?`<polygon points="19,60 22,68 19,76 16,68" fill="${c.blade}" opacity=".5"/>`:''}
  <rect x="82" y="30" width="6" height="55" rx="2" fill="${c.blade}" stroke="${c.out}" stroke-width="1"/>
  ${swordTip}
  <rect x="76" y="48" width="18" height="5" rx="2" fill="${c.sword}" stroke="${c.out}" stroke-width="1"/>
  <rect x="84" y="82" width="3" height="14" rx="1" fill="${c.sword}" stroke="${c.out}" stroke-width="1"/>
  <rect x="38" y="95" width="14" height="28" rx="4" fill="${c.armor}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="56" y="95" width="14" height="28" rx="4" fill="${c.armor}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="36" y="116" width="16" height="10" rx="3" fill="${c.body}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="54" y="116" width="16" height="10" rx="3" fill="${c.body}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="32" y="62" width="44" height="38" rx="6" fill="${c.armor}" stroke="${c.out}" stroke-width="1.5"/>
  ${armorGem}${tier>=6?`<polygon points="54,66 60,76 54,86 48,76" fill="${c.blade}" opacity=".4"/>`:''}
  <rect x="17" y="63" width="16" height="10" rx="5" fill="${c.armor}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="75" y="63" width="16" height="10" rx="5" fill="${c.armor}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="47" y="53" width="14" height="12" rx="3" fill="${c.body}" stroke="${c.out}" stroke-width="1.5"/>
  <ellipse cx="54" cy="42" rx="18" ry="17" fill="${c.helm}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="40" y="44" width="28" height="10" rx="2" fill="${c.body}" stroke="${c.out}" stroke-width="1.2"/>
  <line x1="40" y1="49" x2="68" y2="49" stroke="${c.out}" stroke-width="1" opacity=".5"/>
  <rect x="43" y="45" width="9" height="3" rx="1.5" fill="${c.out}" opacity=".7"/>
  <rect x="56" y="45" width="9" height="3" rx="1.5" fill="${c.out}" opacity=".7"/>
  ${micro>=2?`<rect x="43" y="45" width="9" height="3" rx="1.5" fill="${mc}" opacity=".5"/><rect x="56" y="45" width="9" height="3" rx="1.5" fill="${mc}" opacity=".5"/>`:''}
  ${tier>=1?`<rect x="50" y="25" width="8" height="18" rx="2" fill="${c.armor}" stroke="${c.out}" stroke-width="1"/>`:''}
  ${helmFeather}
  ${tier>=3?`<ellipse cx="54" cy="25" rx="6" ry="5" fill="${c.blade}" stroke="${c.out}" stroke-width="1"/>`:''}
  ${tier>=7?`<polygon points="54,18 57,25 54,28 51,25" fill="${c.blade}" opacity=".8"/>`:''}
  ${aura}</g></svg>`;
}

// ── STATE ──
let state={quests:[],cats:{},life:{lv:1,exp:0},collapsed:{},journal:{}};
let activeQuestId=null,lvQueue=[],showingLv=false,presetEditId=null;
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();

function save(){localStorage.setItem(SAVE_KEY,JSON.stringify(state));}
function load(){
  try{const r=localStorage.getItem(SAVE_KEY);if(r){state=JSON.parse(r);
    // migrate: add presets/journal if missing
    state.quests.forEach(q=>{if(!q.presets)q.presets=[];});
    if(!state.journal)state.journal={};
    if(!state.cats.mental)state.cats.mental={lv:1,exp:0};
    return;}}catch(e){}
  state={quests:JSON.parse(JSON.stringify(DEFAULT_QUESTS)),cats:JSON.parse(JSON.stringify(DEFAULT_CATS)),life:{lv:1,exp:0},collapsed:{},journal:{}};
}

function todayStr(){return new Date().toLocaleDateString('ko-KR',{month:'short',day:'numeric'});}
function dateKey(d){return d.toLocaleDateString('ko-KR',{year:'numeric',month:'short',day:'numeric'});}
function getTodayLog(q){return q.logs.find(l=>l.date===todayStr())||null;}

// ── PAGE NAV ──
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='journal')renderCalendar();
}

// ── RENDER LIFE ──
function renderLife(){
  const L=state.life;
  const maxExp=L.lv>=100?99999:expForLv(L.lv);
  const pct=L.lv>=100?100:Math.min(100,(L.exp/maxExp)*100);
  document.getElementById('lifeLvText').textContent=`LV.${L.lv}`;
  document.getElementById('lifeTitleText').textContent=lifeTitleForLv(L.lv);
  document.getElementById('lifeExpText').textContent=L.lv>=100?'MAX':(`EXP ${L.exp}/${maxExp}`);
  document.getElementById('lifeBar').style.width=pct+'%';
  document.getElementById('knightWrap').innerHTML=knightSVG(L.lv);
}

// ── RENDER DASHBOARD CATS ──
function renderDashCats(){
  ['Left','Right'].forEach((side,si)=>{
    const keys=si===0?LEFT_CATS:RIGHT_CATS;
    document.getElementById('cat'+side).innerHTML=keys.map(key=>{
      const meta=CAT_META[key];const cat=state.cats[key];
      const maxExp=expForLv(cat.lv);
      const pct=Math.min(100,(cat.exp/maxExp)*100);
      return `<div class="cat-mini-card">
        <div class="cat-mini-top">
          <div class="cat-mini-dot" style="background:${meta.color}"></div>
          <span class="cat-mini-name">${meta.icon} ${meta.label}</span>
          <span class="cat-mini-lv" style="color:${meta.color}">LV.${cat.lv}</span>
        </div>
        <div class="cat-mini-bar-wrap">
          <div class="cat-mini-bar-fill" style="width:${pct}%;background:${meta.color}"></div>
        </div>
      </div>`;
    }).join('');
  });
}

// ── RENDER QUESTS ──
function renderQuests(){
  const today=todayStr();
  document.getElementById('questSections').innerHTML=CAT_KEYS.map(key=>{
    const meta=CAT_META[key];
    const quests=state.quests.filter(q=>q.cat===key);
    const isOpen=!state.collapsed['q_'+key];
    const qHtml=quests.map(q=>{
      const maxExp=expForLv(q.lv);
      const pct=Math.min(100,(q.exp/maxExp)*100);
      const todayLog=getTodayLog(q);
      const doneClass=todayLog?'done-today':'';
      const todayLogHtml=todayLog?`<div class="log-area"><div class="log-entry" style="border-color:${meta.color}">
        <span class="log-exp" style="color:${meta.color}">+${todayLog.exp} EXP</span>
        <span>${todayLog.memo}</span>
      </div></div>`:'';
      const btnLabel=todayLog?'✏️ 수정':'EXP UP';
      return `<div class="quest-card ${doneClass}">
        <div class="quest-top">
          <div class="quest-name-wrap">
            <span class="quest-name">${q.name}</span>
            <span class="quest-lv-big" style="color:${meta.color}">LV.${q.lv}</span>
          </div>
          <button class="btn-preset-edit" onclick="openPresetModal(${q.id})" title="빠른입력 설정">⚙️</button>
          <button class="btn-del" onclick="delQuest(${q.id})">✕</button>
        </div>
        <div class="quest-row">
          <div class="quest-bar-wrap"><div class="quest-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${meta.color}88,${meta.color})"></div></div>
          <button class="exp-up-btn" onclick="openModal(${q.id})" style="border-color:${meta.color}55;color:${meta.color}">${btnLabel}</button>
        </div>
        ${todayLogHtml}
      </div>`;
    }).join('');
    return `<div class="cat-section" style="margin-bottom:10px">
      <div class="cat-header" onclick="toggleQuestCat('${key}')">
        <div class="cat-dot" style="background:${meta.color}"></div>
        <span class="cat-h-name">${meta.label} 퀘스트</span>
        <span class="cat-h-lv" style="color:${meta.color};border-color:${meta.color};background:${meta.bg}">LV.${state.cats[key].lv}</span>
        <span class="cat-toggle ${isOpen?'open':''}">▼</span>
      </div>
      ${isOpen?`<div class="cat-body">${qHtml}
        <div class="add-quest-row">
          <input type="text" id="newQ_${key}" placeholder="새 퀘스트 추가..."/>
          <button class="btn-add-quest" onclick="addQuest('${key}')">+ 추가</button>
        </div>
      </div>`:''}
    </div>`;
  }).join('');
}

function render(){renderLife();renderDashCats();renderQuests();}

// ── TOGGLE ──
function toggleQuestCat(key){const k='q_'+key;state.collapsed[k]=!state.collapsed[k];save();renderQuests();}

// ── ADD/DEL QUEST ──
function addQuest(catKey){
  const inp=document.getElementById('newQ_'+catKey);
  const name=inp.value.trim();if(!name)return;
  state.quests.push({id:Date.now(),cat:catKey,name,lv:1,exp:0,logs:[],presets:[]});
  inp.value='';save();renderQuests();
}
function delQuest(id){
  if(!confirm('이 퀘스트를 삭제할까요?'))return;
  state.quests=state.quests.filter(q=>q.id!==id);save();renderQuests();
}

// ── EXP MODAL ──
function openModal(id){
  activeQuestId=id;
  const q=state.quests.find(x=>x.id===id);
  const meta=CAT_META[q.cat];
  const todayLog=getTodayLog(q);
  document.getElementById('modalQuestName').textContent=`${meta.label} — ${q.name}`;
  if(todayLog){
    document.getElementById('modalTitle').textContent='✏️ 오늘 기록 수정';
    document.getElementById('modalModeNote').textContent=`현재: +${todayLog.exp} EXP / "${todayLog.memo}"`;
    document.getElementById('modalModeNote').style.display='block';
    document.getElementById('expLabel').textContent='오늘 총 경험치 (수정)';
    document.getElementById('expInput').value=todayLog.exp;
    document.getElementById('memoInput').value=todayLog.memo==='기록 없음'?'':todayLog.memo;
  } else {
    document.getElementById('modalTitle').textContent='⚡ EXP UP';
    document.getElementById('modalModeNote').style.display='none';
    document.getElementById('expLabel').textContent='추가할 경험치';
    document.getElementById('expInput').value='';
    document.getElementById('memoInput').value='';
  }
  // Render presets
  const presetArea=document.getElementById('presetArea');
  if(q.presets&&q.presets.length>0&&!todayLog){
    presetArea.innerHTML=`<div class="preset-btns">${q.presets.map((p,i)=>`
      <button class="preset-btn" onclick="selectPreset(${i})">
        <span>${p.memo}</span>
        <span class="preset-exp">+${p.exp} EXP</span>
      </button>`).join('')}</div>
      <div class="preset-divider">직접 입력</div>`;
  } else {
    presetArea.innerHTML='';
  }
  document.getElementById('expModal').classList.add('open');
  setTimeout(()=>document.getElementById('expInput').focus(),80);
}
function selectPreset(i){
  const q=state.quests.find(x=>x.id===activeQuestId);
  const p=q.presets[i];
  document.getElementById('expInput').value=p.exp;
  document.getElementById('memoInput').value=p.memo;
}
function closeModal(){document.getElementById('expModal').classList.remove('open');activeQuestId=null;}

function confirmExp(){
  const newExp=parseInt(document.getElementById('expInput').value)||0;
  const memo=document.getElementById('memoInput').value.trim()||'기록 없음';
  if(newExp<=0){alert('경험치는 1 이상이어야 해요!');return;}
  const q=state.quests.find(x=>x.id===activeQuestId);
  const meta=CAT_META[q.cat];
  const today=todayStr();
  const todayLog=getTodayLog(q);
  if(todayLog){
    const diff=newExp-todayLog.exp;
    if(diff===0&&memo===todayLog.memo){closeModal();return;}
    todayLog.exp=newExp;todayLog.memo=memo;
    if(diff>0){q.exp+=diff;}
    else if(diff<0){q.exp=Math.max(0,q.exp+diff);}
  } else {
    q.exp+=newExp;
    q.logs.unshift({date:today,exp:newExp,memo});
    // Keep all logs but only show today's in active quests
    // Save to journal
    if(!state.journal[today])state.journal[today]=[];
    state.journal[today].push({cat:q.cat,questName:q.name,exp:newExp,memo});
  }
  while(q.exp>=expForLv(q.lv)){
    q.exp-=expForLv(q.lv);
    const prevLv=q.lv;q.lv++;
    lvQueue.push({icon:CAT_META[q.cat].icon,title:'LEVEL UP!',sub:`${meta.label} — ${q.name}\n→  LV.${q.lv}`});
    propagateCat(q.cat,prevLv);
  }
  closeModal();save();render();processQ();
}

// ── PRESET EDIT MODAL ──
function openPresetModal(id){
  presetEditId=id;
  const q=state.quests.find(x=>x.id===id);
  const meta=CAT_META[q.cat];
  document.getElementById('presetModalSub').textContent=`${meta.label} — ${q.name}`;
  renderPresetEdit(q.presets||[]);
  document.getElementById('presetModal').classList.add('open');
}
function renderPresetEdit(presets){
  const rows=presets.map((p,i)=>`
    <div class="preset-item-row">
      <input type="text" value="${p.memo}" id="pe_memo_${i}" placeholder="내용"/>
      <input type="number" value="${p.exp}" id="pe_exp_${i}" placeholder="EXP" min="1"/>
      <button class="preset-remove" onclick="removePresetRow(${i})">✕</button>
    </div>`).join('');
  const addBtn=presets.length<3?`<button class="btn-add-quest" onclick="addPresetRow()" style="width:100%;margin-top:4px">+ 항목 추가 (최대 3개)</button>`:'';
  document.getElementById('presetEditArea').innerHTML=rows+addBtn;
}
function addPresetRow(){
  const q=state.quests.find(x=>x.id===presetEditId);
  if(!q.presets)q.presets=[];
  if(q.presets.length>=3)return;
  q.presets.push({memo:'',exp:1});
  renderPresetEdit(q.presets);
}
function removePresetRow(i){
  const q=state.quests.find(x=>x.id===presetEditId);
  q.presets.splice(i,1);renderPresetEdit(q.presets);
}
function savePresets(){
  const q=state.quests.find(x=>x.id===presetEditId);
  const newPresets=[];
  (q.presets||[]).forEach((_,i)=>{
    const memo=document.getElementById('pe_memo_'+i)?.value.trim();
    const exp=parseInt(document.getElementById('pe_exp_'+i)?.value)||1;
    if(memo)newPresets.push({memo,exp});
  });
  q.presets=newPresets;
  closePresetModal();save();renderQuests();
}
function closePresetModal(){document.getElementById('presetModal').classList.remove('open');presetEditId=null;}

// ── PROPAGATE ──
function propagateCat(catKey,gain){
  const cat=state.cats[catKey];const meta=CAT_META[catKey];
  cat.exp+=gain;
  while(cat.exp>=expForLv(cat.lv)){
    cat.exp-=expForLv(cat.lv);const prevLv=cat.lv;cat.lv++;
    lvQueue.push({icon:'🏆',title:'CATEGORY UP!',sub:`${meta.label} 카테고리\n→  LV.${cat.lv}`});
    propagateLife(prevLv);
  }
}
function propagateLife(gain){
  const L=state.life;if(L.lv>=100)return;
  L.exp+=gain;
  while(L.lv<100&&L.exp>=expForLv(L.lv)){
    L.exp-=expForLv(L.lv);L.lv++;
    lvQueue.push({icon:'⭐',title:'LIFE LEVEL UP!',sub:`인생 레벨  →  LV.${L.lv}\n「${lifeTitleForLv(L.lv)}」`});
  }
  if(L.lv>=100){L.lv=100;L.exp=0;}
}

// ── LEVEL UP QUEUE ──
function processQ(){
  if(showingLv||lvQueue.length===0)return;
  showingLv=true;
  const item=lvQueue.shift();
  document.getElementById('lvIcon').textContent=item.icon;
  document.getElementById('lvTitle').textContent=item.title;
  document.getElementById('lvSub').textContent=item.sub;
  document.getElementById('lvModal').classList.add('open');
  render();
}
function closeLvModal(){document.getElementById('lvModal').classList.remove('open');showingLv=false;setTimeout(processQ,100);}

// ── CALENDAR ──
function calMove(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function renderCalendar(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent=`${calYear}년 ${months[calMonth]}`;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  const dows=['일','월','화','수','목','금','토'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(calYear,calMonth,d);
    const key=dateKey(dt);
    const isToday=dt.toDateString()===today.toDateString();
    const entries=state.journal[key]||[];
    const dots=[...new Set(entries.map(e=>e.cat))].map(cat=>`<div class="cal-dot" style="background:${CAT_META[cat]?.color||'#888'}"></div>`).join('');
    html+=`<div class="cal-day ${isToday?'today':''}" onclick="openCalDetail('${key}')">
      <span class="cal-day-num">${d}</span>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}
function openCalDetail(key){
  const entries=state.journal[key]||[];
  document.getElementById('calDetailTitle').textContent=`📅 ${key}`;
  if(entries.length===0){
    document.getElementById('calDetailBody').innerHTML=`<div style="text-align:center;color:var(--text-dim);padding:20px;font-size:13px;">기록 없음</div>`;
  } else {
    document.getElementById('calDetailBody').innerHTML=entries.map(e=>{
      const meta=CAT_META[e.cat]||{color:'#888',label:e.cat};
      return `<div class="cal-detail-item">
        <div class="cal-detail-dot" style="background:${meta.color}"></div>
        <span style="font-size:12px;color:${meta.color};font-weight:800">${meta.label}</span>
        <span style="font-size:12px;flex:1">${e.questName} — ${e.memo}</span>
        <span class="cal-detail-exp" style="color:${meta.color}">+${e.exp}</span>
      </div>`;
    }).join('');
  }
  document.getElementById('calDetailOverlay').classList.add('open');
}
function closeCalDetail(){document.getElementById('calDetailOverlay').classList.remove('open');}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closePresetModal();closeCalDetail();}
  if(e.key==='Enter'&&document.getElementById('expModal').classList.contains('open')&&document.activeElement.tagName!=='TEXTAREA')confirmExp();
  if(e.key==='Enter'&&document.getElementById('lvModal').classList.contains('open'))closeLvModal();
});

load();render();
</script>
</body>
</html>
