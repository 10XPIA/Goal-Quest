<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoalQuest — 인생 레벨업</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080816;
  --panel: #10102a;
  --panel2: #181836;
  --border: #252550;
  --text: #e2e8f0;
  --text-dim: #7080a0;
  --pixel: 'Press Start 2P', monospace;
  --body: 'Nanum Gothic', sans-serif;
  --gold: #f5c842;
  --gold2: #ffaa00;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 15% 40%, rgba(239,68,68,0.04) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 20%, rgba(96,165,250,0.04) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 90%, rgba(245,200,66,0.04) 0%, transparent 55%);
}
.wrap { max-width: 820px; margin: 0 auto; padding: 20px 14px 80px; }
.header { text-align: center; padding: 28px 0 20px; }
.header h1 { font-family: var(--pixel); font-size: 18px; color: var(--gold); text-shadow: 0 0 24px rgba(245,200,66,0.7); letter-spacing: 2px; margin-bottom: 4px; }
.header .sub { font-size: 12px; color: var(--text-dim); letter-spacing: 3px; }

/* Life Card */
.life-card {
  background: linear-gradient(135deg, #14142e, #1e1e42);
  border: 1px solid rgba(245,200,66,0.3);
  border-radius: 16px; padding: 20px; margin-bottom: 20px;
  display: flex; gap: 20px; align-items: center;
  box-shadow: 0 0 40px rgba(245,200,66,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative; overflow: hidden;
}
.life-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.knight-wrap { flex-shrink: 0; width: 110px; height: 110px; }
.knight-wrap svg { width: 100%; height: 100%; }
.life-info { flex: 1; min-width: 0; }
.life-lv-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.life-lv { font-family: var(--pixel); font-size: 14px; color: var(--gold); text-shadow: 0 0 12px rgba(245,200,66,0.6); }
.life-title { font-size: 12px; color: var(--gold2); font-weight: 700; opacity: 0.8; }
.life-exp-text { font-family: var(--pixel); font-size: 7px; color: var(--text-dim); margin-bottom: 8px; }
.life-bar-wrap { height: 16px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid rgba(245,200,66,0.2); overflow: hidden; }
.life-bar-fill { height: 100%; background: linear-gradient(90deg, #c97c00, var(--gold), #ffe080); border-radius: 8px; transition: width 0.8s cubic-bezier(0.34,1.3,0.64,1); position: relative; }
.life-bar-fill::after { content: ''; position: absolute; top: 3px; left: 4px; right: 4px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 4px; }

/* Cat / Quest sections */
.cat-section { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
.cat-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; transition: background 0.15s; }
.cat-header:hover { background: rgba(255,255,255,0.02); }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cat-name { font-weight: 800; font-size: 14px; flex: 1; }
.cat-lv { font-family: var(--pixel); font-size: 8px; padding: 3px 8px; border-radius: 4px; border: 1px solid; }
.cat-exp-text { font-family: var(--pixel); font-size: 7px; color: var(--text-dim); }
.cat-bar-mini { width: 80px; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; flex-shrink: 0; }
.cat-bar-mini-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.34,1.3,0.64,1); }
.cat-toggle { color: var(--text-dim); font-size: 12px; flex-shrink: 0; transition: transform 0.2s; }
.cat-toggle.open { transform: rotate(180deg); }
.cat-body { padding: 0 12px 12px; }

/* Quest card */
.quest-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-top: 8px; transition: border-color 0.2s; }
.quest-card:hover { border-color: rgba(255,255,255,0.1); }
.quest-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.quest-name { font-weight: 800; font-size: 13px; flex: 1; min-width: 100px; }
.quest-lv { font-family: var(--pixel); font-size: 7px; padding: 3px 6px; border-radius: 3px; border: 1px solid; }
.quest-exp-txt { font-family: var(--pixel); font-size: 7px; color: var(--text-dim); }
.quest-row { display: flex; align-items: center; gap: 8px; }
.quest-bar-wrap { flex: 1; height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; border: 1px solid var(--border); overflow: hidden; }
.quest-bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s cubic-bezier(0.34,1.3,0.64,1); position: relative; }
.quest-bar-fill::after { content: ''; position: absolute; top: 1px; left: 3px; right: 3px; height: 2px; background: rgba(255,255,255,0.3); border-radius: 2px; }
.exp-up-btn { font-family: var(--pixel); font-size: 6px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: var(--text); padding: 6px 8px; border-radius: 6px; cursor: pointer; white-space: nowrap; transition: background 0.15s, transform 0.1s; }
.exp-up-btn:hover { background: rgba(255,255,255,0.12); transform: scale(1.05); }
.log-area { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
.log-entry { font-size: 11px; color: var(--text-dim); background: rgba(255,255,255,0.02); border-left: 2px solid; padding: 3px 7px; border-radius: 0 4px 4px 0; display: flex; gap: 8px; align-items: center; }
.log-exp { font-family: var(--pixel); font-size: 6px; white-space: nowrap; }
.log-date { font-size: 10px; color: rgba(148,163,184,0.4); white-space: nowrap; }
.add-quest-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.add-quest-row input { flex: 1; min-width: 120px; background: rgba(255,255,255,0.04); border: 1px dashed var(--border); border-radius: 7px; color: var(--text); font-family: var(--body); font-size: 12px; padding: 7px 10px; outline: none; }
.add-quest-row input:focus { border-color: rgba(255,255,255,0.2); }
.btn-add-quest { font-family: var(--pixel); font-size: 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: var(--text); padding: 7px 10px; border-radius: 7px; cursor: pointer; transition: background 0.15s; }
.btn-add-quest:hover { background: rgba(255,255,255,0.12); }
.btn-del { background: transparent; border: none; color: rgba(255,255,255,0.2); cursor: pointer; font-size: 13px; padding: 2px 4px; line-height: 1; transition: color 0.15s; }
.btn-del:hover { color: #ef4444; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index: 100; justify-content: center; align-items: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--panel2); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 26px 22px; width: 100%; max-width: 400px; animation: pop 0.2s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-title { font-family: var(--pixel); font-size: 9px; color: var(--gold); margin-bottom: 6px; text-align: center; }
.modal-sub { font-size: 12px; color: var(--text-dim); text-align: center; margin-bottom: 18px; font-weight: 700; }
.field-wrap { margin-bottom: 14px; }
.field-label { font-family: var(--pixel); font-size: 6px; color: var(--text-dim); margin-bottom: 5px; display: block; }
.modal input, .modal textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--body); font-size: 14px; padding: 9px 12px; outline: none; transition: border-color 0.2s; }
.modal input:focus, .modal textarea:focus { border-color: rgba(255,255,255,0.3); }
.modal input[type=number] { font-family: var(--pixel); font-size: 20px; text-align: center; }
.modal textarea { resize: none; height: 65px; }
.modal-btns { display: flex; gap: 8px; margin-top: 18px; }
.btn-confirm { flex: 1; font-family: var(--pixel); font-size: 7px; background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; border: none; padding: 13px; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 14px rgba(124,58,237,0.4); transition: transform 0.1s; }
.btn-confirm:hover { transform: translateY(-2px); }
.btn-cancel { font-family: var(--pixel); font-size: 7px; background: transparent; color: var(--text-dim); border: 1px solid var(--border); padding: 13px 16px; border-radius: 8px; cursor: pointer; }
.levelup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; }
.levelup-overlay.open { display: flex; }
.levelup-box { text-align: center; animation: levelup 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes levelup { from { transform: scale(0.4) rotate(-8deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
.levelup-icon { font-size: 52px; margin-bottom: 12px; }
.levelup-title { font-family: var(--pixel); font-size: 20px; color: var(--gold); text-shadow: 0 0 30px rgba(245,200,66,0.9); line-height: 1.5; margin-bottom: 8px; }
.levelup-sub { font-family: var(--pixel); font-size: 8px; color: #60a5fa; margin-bottom: 22px; line-height: 1.8; }
.levelup-close { font-family: var(--pixel); font-size: 7px; border: 1px solid var(--gold); color: var(--gold); background: transparent; padding: 11px 18px; border-radius: 6px; cursor: pointer; }
.section-hd { font-family: var(--pixel); font-size: 7px; color: var(--text-dim); margin: 22px 0 10px; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
.section-hd::after { content: ''; flex: 1; height: 1px; background: var(--border); }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>⚔ GOAL QUEST ⚔</h1>
    <div class="sub">나의 인생을 레벨업하라</div>
  </div>
  <div class="life-card">
    <div class="knight-wrap" id="knightWrap"></div>
    <div class="life-info">
      <div class="life-lv-row">
        <span class="life-lv" id="lifeLvText">LV.1</span>
        <span class="life-title" id="lifeTitleText">견습 모험가</span>
      </div>
      <div class="life-exp-text" id="lifeExpText">EXP 0 / 10</div>
      <div class="life-bar-wrap">
        <div class="life-bar-fill" id="lifeBar" style="width:0%"></div>
      </div>
    </div>
  </div>
  <div class="section-hd">CATEGORIES</div>
  <div id="catList"></div>
  <div class="section-hd">ACTIVE QUESTS</div>
  <div id="questSections"></div>
</div>

<div class="modal-overlay" id="expModal">
  <div class="modal">
    <div class="modal-title">⚡ EXP UP</div>
    <div class="modal-sub" id="modalQuestName"></div>
    <div class="field-wrap">
      <label class="field-label">추가할 경험치</label>
      <input type="number" id="expInput" min="1" placeholder="1" />
    </div>
    <div class="field-wrap">
      <label class="field-label">실행 내용 메모</label>
      <textarea id="memoInput" placeholder="오늘 무엇을 했나요?"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-confirm" onclick="confirmExp()">입력 완료</button>
    </div>
  </div>
</div>

<div class="levelup-overlay" id="lvModal">
  <div class="levelup-box">
    <div class="levelup-icon" id="lvIcon">⭐</div>
    <div class="levelup-title" id="lvTitle">LEVEL UP!</div>
    <div class="levelup-sub" id="lvSub"></div>
    <button class="levelup-close" onclick="closeLvModal()">CONTINUE ▶</button>
  </div>
</div>

<script>
const SAVE_KEY = 'goalquest_v3';
const CAT_META = {
  health:  { label:'건강', color:'#ef4444', bg:'rgba(239,68,68,0.12)',   icon:'❤️' },
  family:  { label:'가족', color:'#4ade80', bg:'rgba(74,222,128,0.12)',  icon:'🏠' },
  finance: { label:'재정', color:'#facc15', bg:'rgba(250,204,21,0.12)',  icon:'💰' },
  study:   { label:'학습', color:'#60a5fa', bg:'rgba(96,165,250,0.12)',  icon:'📚' },
  work:    { label:'업무', color:'#94a3b8', bg:'rgba(148,163,184,0.12)', icon:'💼' },
};
const DEFAULT_QUESTS = [
  {id:1,cat:'health', name:'걷기 & 달리기',lv:1,exp:0,logs:[]},
  {id:2,cat:'health', name:'근력운동',lv:1,exp:0,logs:[]},
  {id:3,cat:'health', name:'스트레칭 & 기타',lv:1,exp:0,logs:[]},
  {id:4,cat:'health', name:'물마시기 & 기타',lv:1,exp:0,logs:[]},
  {id:5,cat:'family', name:'가족과 적극적으로 시간보내기',lv:1,exp:0,logs:[]},
  {id:6,cat:'family', name:'식사관련 & 기타',lv:1,exp:0,logs:[]},
  {id:7,cat:'finance',name:'SOXL투자',lv:1,exp:0,logs:[]},
  {id:8,cat:'finance',name:'재정상황 정리 & 기타',lv:1,exp:0,logs:[]},
  {id:9,cat:'study',  name:'독서',lv:1,exp:0,logs:[]},
  {id:10,cat:'study', name:'코딩 & 기타',lv:1,exp:0,logs:[]},
  {id:11,cat:'work',  name:'일일 업무 목표 달성',lv:1,exp:0,logs:[]},
  {id:12,cat:'work',  name:'기타',lv:1,exp:0,logs:[]},
];
const DEFAULT_CATS = {health:{lv:1,exp:0},family:{lv:1,exp:0},finance:{lv:1,exp:0},study:{lv:1,exp:0},work:{lv:1,exp:0}};

let state = {quests:[],cats:{},life:{lv:1,exp:0},collapsed:{}};
let activeQuestId = null;
let lvQueue = [];

function expForLv(lv){return lv*10;}
function lifeTitleForLv(lv){
  if(lv<5)  return '견습 모험가';
  if(lv<10) return '초보 전사';
  if(lv<20) return '숙련 전사';
  if(lv<30) return '정예 기사';
  if(lv<40) return '기사단장';
  if(lv<50) return '용사';
  if(lv<60) return '영웅';
  if(lv<70) return '전설의 용사';
  if(lv<80) return '불멸의 전사';
  if(lv<90) return '신화의 기사';
  return '황금 기사단장';
}

function knightSVG(lv){
  const tier = lv>=90?10:lv>=80?9:lv>=70?8:lv>=60?7:lv>=50?6:lv>=40?5:lv>=30?4:lv>=20?3:lv>=10?2:lv>=5?1:0;
  const T=[
    {body:'#8B6914',armor:'#a07820',helm:'#8B6914',shield:'#7a5c10',blade:'#c8a84a',sword:'#a07820',out:'#5a3c08'},
    {body:'#6b4c2a',armor:'#7d5a32',helm:'#6b4c2a',shield:'#5a3d1e',blade:'#c0a060',sword:'#8a6a3a',out:'#3d2408'},
    {body:'#6a7080',armor:'#7a8090',helm:'#6a7080',shield:'#5a6070',blade:'#b0c0d0',sword:'#8090a0',out:'#3a4050'},
    {body:'#7a8898',armor:'#909faf',helm:'#7a8898',shield:'#6a7888',blade:'#d0e0f0',sword:'#a0b0c0',out:'#404858'},
    {body:'#3a5888',armor:'#4a70a8',helm:'#3a5888',shield:'#2a4878',blade:'#a0c8f8',sword:'#5a80c8',out:'#1a3060'},
    {body:'#2a2a3a',armor:'#383848',helm:'#2a2a3a',shield:'#1a1a28',blade:'#8080f0',sword:'#5050a0',out:'#101018'},
    {body:'#a0a8b8',armor:'#c0c8d8',helm:'#a0a8b8',shield:'#909aa8',blade:'#e8f0ff',sword:'#c8d0e0',out:'#606870'},
    {body:'#909aa8',armor:'#c0a030',helm:'#909aa8',shield:'#707880',blade:'#f0d060',sword:'#d0b040',out:'#505860'},
    {body:'#882030',armor:'#b02838',helm:'#882030',shield:'#681820',blade:'#ff8090',sword:'#d03040',out:'#401018'},
    {body:'#c0a030',armor:'#e0c040',helm:'#c0a030',shield:'#a08020',blade:'#fff080',sword:'#e8d050',out:'#806010'},
    {body:'#d4aa20',armor:'#f5c842',helm:'#d4aa20',shield:'#c09018',blade:'#ffffc0',sword:'#f8d848',out:'#8a6000'},
  ];
  const c=T[tier];
  const glow=tier>=3?`<filter id="gf"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`:'';
  const uf=tier>=3?'filter="url(#gf)"':'';
  const stars=tier>=7?`<circle cx="20" cy="18" r="2" fill="${c.blade}" opacity="0.8"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.2s" repeatCount="indefinite"/></circle><circle cx="90" cy="22" r="1.5" fill="${c.blade}" opacity="0.6"><animate attributeName="opacity" values="0.6;0;0.6" dur="0.9s" repeatCount="indefinite"/></circle><circle cx="75" cy="10" r="2" fill="${c.blade}" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="1.5s" repeatCount="indefinite"/></circle>`:'';
  const aura=tier>=8?`<ellipse cx="54" cy="70" rx="48" ry="58" fill="none" stroke="${c.blade}" stroke-width="1" opacity="0.15"><animate attributeName="opacity" values="0.15;0.03;0.15" dur="2s" repeatCount="indefinite"/></ellipse>`:'';
  return `<svg viewBox="0 0 110 130" xmlns="http://www.w3.org/2000/svg"><defs>${glow}</defs><g ${uf}>${stars}
  <rect x="8" y="55" width="22" height="30" rx="4" fill="${c.shield}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="11" y="58" width="16" height="22" rx="2" fill="${c.armor}" opacity="0.5"/>
  <line x1="19" y1="56" x2="19" y2="84" stroke="${c.out}" stroke-width="1" opacity="0.5"/>
  <line x1="9" y1="70" x2="29" y2="70" stroke="${c.out}" stroke-width="1" opacity="0.5"/>
  ${tier>=5?`<polygon points="19,60 22,68 19,76 16,68" fill="${c.blade}" opacity="0.5"/>`:''}
  <rect x="82" y="30" width="6" height="55" rx="2" fill="${c.blade}" stroke="${c.out}" stroke-width="1"/>
  <rect x="76" y="48" width="18" height="5" rx="2" fill="${c.sword}" stroke="${c.out}" stroke-width="1"/>
  <rect x="84" y="82" width="3" height="14" rx="1" fill="${c.sword}" stroke="${c.out}" stroke-width="1"/>
  <rect x="38" y="95" width="14" height="28" rx="4" fill="${c.armor}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="56" y="95" width="14" height="28" rx="4" fill="${c.armor}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="36" y="116" width="16" height="10" rx="3" fill="${c.body}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="54" y="116" width="16" height="10" rx="3" fill="${c.body}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="32" y="62" width="44" height="38" rx="6" fill="${c.armor}" stroke="${c.out}" stroke-width="1.5"/>
  ${tier>=6?`<polygon points="54,66 60,76 54,86 48,76" fill="${c.blade}" opacity="0.4"/>`:''}
  <rect x="17" y="63" width="16" height="10" rx="5" fill="${c.armor}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="75" y="63" width="16" height="10" rx="5" fill="${c.armor}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="47" y="53" width="14" height="12" rx="3" fill="${c.body}" stroke="${c.out}" stroke-width="1.5"/>
  <ellipse cx="54" cy="42" rx="18" ry="17" fill="${c.helm}" stroke="${c.out}" stroke-width="1.5"/>
  <rect x="40" y="44" width="28" height="10" rx="2" fill="${c.body}" stroke="${c.out}" stroke-width="1.2"/>
  <line x1="40" y1="49" x2="68" y2="49" stroke="${c.out}" stroke-width="1" opacity="0.5"/>
  <rect x="43" y="45" width="9" height="3" rx="1.5" fill="${c.out}" opacity="0.7"/>
  <rect x="56" y="45" width="9" height="3" rx="1.5" fill="${c.out}" opacity="0.7"/>
  ${tier>=1?`<rect x="50" y="25" width="8" height="18" rx="2" fill="${c.armor}" stroke="${c.out}" stroke-width="1"/>`:''}
  ${tier>=3?`<ellipse cx="54" cy="25" rx="6" ry="5" fill="${c.blade}" stroke="${c.out}" stroke-width="1"/>`:''}
  ${tier>=7?`<polygon points="54,18 57,25 54,28 51,25" fill="${c.blade}" opacity="0.8"/>`:''}
  ${aura}</g></svg>`;
}

function save(){localStorage.setItem(SAVE_KEY,JSON.stringify(state));}
function load(){
  try{const r=localStorage.getItem(SAVE_KEY);if(r){state=JSON.parse(r);return;}}catch(e){}
  state={quests:JSON.parse(JSON.stringify(DEFAULT_QUESTS)),cats:JSON.parse(JSON.stringify(DEFAULT_CATS)),life:{lv:1,exp:0},collapsed:{}};
}

function renderLife(){
  const L=state.life;
  const maxExp=L.lv>=100?999:expForLv(L.lv);
  const pct=L.lv>=100?100:Math.min(100,(L.exp/maxExp)*100);
  document.getElementById('lifeLvText').textContent=`LV.${L.lv}`;
  document.getElementById('lifeTitleText').textContent=lifeTitleForLv(L.lv);
  document.getElementById('lifeExpText').textContent=L.lv>=100?'MAX LEVEL':`EXP ${L.exp} / ${maxExp}`;
  document.getElementById('lifeBar').style.width=pct+'%';
  document.getElementById('knightWrap').innerHTML=knightSVG(L.lv);
}

function renderCats(){
  document.getElementById('catList').innerHTML=Object.entries(CAT_META).map(([key,meta])=>{
    const cat=state.cats[key];
    const maxExp=expForLv(cat.lv);
    const pct=Math.min(100,(cat.exp/maxExp)*100);
    return `<div class="cat-section"><div class="cat-header" onclick="toggleCat('${key}')">
      <div class="cat-dot" style="background:${meta.color}"></div>
      <span class="cat-name">${meta.icon} ${meta.label}</span>
      <span class="cat-lv" style="color:${meta.color};border-color:${meta.color};background:${meta.bg}">LV.${cat.lv}</span>
      <span class="cat-exp-text">${cat.exp}/${maxExp}</span>
      <div class="cat-bar-mini"><div class="cat-bar-mini-fill" style="width:${pct}%;background:${meta.color}"></div></div>
      <span class="cat-toggle ${state.collapsed[key]?'':'open'}">▼</span>
    </div></div>`;
  }).join('');
}

function renderQuests(){
  document.getElementById('questSections').innerHTML=Object.entries(CAT_META).map(([key,meta])=>{
    const quests=state.quests.filter(q=>q.cat===key);
    const isOpen=!state.collapsed['q_'+key];
    const qHtml=quests.map(q=>{
      const maxExp=expForLv(q.lv);
      const pct=Math.min(100,(q.exp/maxExp)*100);
      const logs=q.logs.slice(0,3).map(l=>`<div class="log-entry" style="border-color:${meta.color}"><span class="log-date">${l.date}</span><span class="log-exp" style="color:${meta.color}">+${l.exp}</span><span>${l.memo}</span></div>`).join('');
      return `<div class="quest-card"><div class="quest-top">
        <span class="quest-name">${q.name}</span>
        <span class="quest-lv" style="color:${meta.color};border-color:${meta.color};background:${meta.bg}">LV.${q.lv}</span>
        <span class="quest-exp-txt">${q.exp}/${maxExp}</span>
        <button class="btn-del" onclick="delQuest(${q.id})">✕</button>
      </div><div class="quest-row">
        <div class="quest-bar-wrap"><div class="quest-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${meta.color}88,${meta.color})"></div></div>
        <button class="exp-up-btn" onclick="openModal(${q.id})" style="border-color:${meta.color}55;color:${meta.color}">EXP UP</button>
      </div>${logs?`<div class="log-area">${logs}</div>`:''}</div>`;
    }).join('');
    return `<div class="cat-section" style="margin-bottom:12px"><div class="cat-header" onclick="toggleQuestCat('${key}')">
      <div class="cat-dot" style="background:${meta.color}"></div>
      <span class="cat-name">${meta.label} 퀘스트</span>
      <span class="cat-toggle ${isOpen?'open':''}">▼</span>
    </div>${isOpen?`<div class="cat-body">${qHtml}<div class="add-quest-row"><input type="text" id="newQ_${key}" placeholder="새 퀘스트 추가..."/><button class="btn-add-quest" onclick="addQuest('${key}')">+ 추가</button></div></div>`:''}</div>`;
  }).join('');
}

function render(){renderLife();renderCats();renderQuests();}

function toggleCat(key){state.collapsed[key]=!state.collapsed[key];save();renderCats();}
function toggleQuestCat(key){const k='q_'+key;state.collapsed[k]=!state.collapsed[k];save();renderQuests();}

function addQuest(catKey){
  const inp=document.getElementById('newQ_'+catKey);
  const name=inp.value.trim();if(!name)return;
  state.quests.push({id:Date.now(),cat:catKey,name,lv:1,exp:0,logs:[]});
  inp.value='';save();renderQuests();
}
function delQuest(id){
  if(!confirm('이 퀘스트를 삭제할까요?'))return;
  state.quests=state.quests.filter(q=>q.id!==id);save();renderQuests();
}
function openModal(id){
  activeQuestId=id;
  const q=state.quests.find(x=>x.id===id);
  const meta=CAT_META[q.cat];
  document.getElementById('modalQuestName').textContent=`${meta.label} — ${q.name}`;
  document.getElementById('expInput').value='';
  document.getElementById('memoInput').value='';
  document.getElementById('expModal').classList.add('open');
  setTimeout(()=>document.getElementById('expInput').focus(),80);
}
function closeModal(){document.getElementById('expModal').classList.remove('open');activeQuestId=null;}

function confirmExp(){
  const expAdd=parseInt(document.getElementById('expInput').value)||0;
  const memo=document.getElementById('memoInput').value.trim()||'기록 없음';
  if(expAdd<=0){alert('경험치는 1 이상이어야 해요!');return;}
  const q=state.quests.find(x=>x.id===activeQuestId);
  const meta=CAT_META[q.cat];
  q.exp+=expAdd;
  const today=new Date().toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
  q.logs.unshift({date:today,exp:expAdd,memo});
  if(q.logs.length>5)q.logs.pop();
  while(q.exp>=expForLv(q.lv)){
    q.exp-=expForLv(q.lv);
    const prevLv=q.lv;q.lv++;
    lvQueue.push({icon:meta.icon,title:'LEVEL UP!',sub:`${meta.label} — ${q.name}\n→  LV.${q.lv}`});
    propagateCat(q.cat,prevLv);
  }
  closeModal();save();render();processQ();
}

function propagateCat(catKey,gain){
  const cat=state.cats[catKey];const meta=CAT_META[catKey];
  cat.exp+=gain;
  while(cat.exp>=expForLv(cat.lv)){
    cat.exp-=expForLv(cat.lv);
    const prevLv=cat.lv;cat.lv++;
    lvQueue.push({icon:'🏆',title:'CATEGORY UP!',sub:`${meta.label} 카테고리\n→  LV.${cat.lv}`});
    propagateLife(prevLv);
  }
}
function propagateLife(gain){
  const L=state.life;if(L.lv>=100)return;
  L.exp+=gain;
  while(L.lv<100&&L.exp>=expForLv(L.lv)){
    L.exp-=expForLv(L.lv);L.lv++;
    lvQueue.push({icon:'⭐',title:'LIFE LEVEL UP!',sub:`인생 레벨  →  LV.${L.lv}\n「${lifeTitleForLv(L.lv)}」`});
  }
  if(L.lv>=100){L.lv=100;L.exp=0;}
}

let showingLv=false;
function processQ(){
  if(showingLv||lvQueue.length===0)return;
  showingLv=true;
  const item=lvQueue.shift();
  document.getElementById('lvIcon').textContent=item.icon;
  document.getElementById('lvTitle').textContent=item.title;
  document.getElementById('lvSub').textContent=item.sub;
  document.getElementById('lvModal').classList.add('open');
  render();
}
function closeLvModal(){document.getElementById('lvModal').classList.remove('open');showingLv=false;setTimeout(processQ,100);}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&document.getElementById('expModal').classList.contains('open')&&document.activeElement.tagName!=='TEXTAREA')confirmExp();
  if(e.key==='Enter'&&document.getElementById('lvModal').classList.contains('open'))closeLvModal();
});

load();render();
</script>
</body>
</html>
